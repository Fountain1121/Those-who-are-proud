<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="login-box">
    <h2>Admin Login</h2>

    <!-- FORM FIX: enables Enter key submit -->
    <form id="adminLoginForm">
      <input id="username" placeholder="Username" autocomplete="username" required />
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" required />

      <button id="loginBtn" type="submit">Login</button>
    </form>

    <p id="msg" class="status"></p>
  </div>

  <script>
    const form = document.getElementById("adminLoginForm");
    const msg = document.getElementById("msg");
    const btn = document.getElementById("loginBtn");

    async function login(event) {
      event.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        msg.innerText = "Please enter both username and password.";
        return;
      }

      btn.disabled = true;
      btn.innerText = "Logging in...";
      msg.innerText = "";

      try {
        const res = await fetch("/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data.error || "Invalid login");
        }

        msg.innerText = "Login successful. Redirecting...";
        window.location.href = "/admin.html";

      } catch (error) {
        msg.innerText = error.message;
        btn.disabled = false;
        btn.innerText = "Login";
      }
    }

    form.addEventListener("submit", login);
  </script>

</body>
</html>
