<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="styles.css" />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      background: #222;
      color: white;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    .download {
      background: #2ecc71;
      color: white;
    }

    .logout {
      background: #e74c3c;
      color: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: left;
    }

    th {
      background: #f4f4f4;
    }

    .container {
      padding: 15px;
    }
  </style>
</head>

<body>
  <header>
    <h1>Submissions Dashboard</h1>

    <div class="actions">
      <button class="download" onclick="downloadCSV()">Download CSV</button>
      <button class="logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="container">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Index</th>
          <th>Date</th>
          <th>Submitted At</th>
          <th>Time Spent (s)</th>
        </tr>
      </thead>

      <tbody id="table"></tbody>
    </table>
  </div>

  <script>
    // ---------- Load submissions ----------
    async function load() {
      const res = await fetch("/api/submissions");

      if (res.status === 401) {
        window.location.href = "/admin-login.html";
        return;
      }

      const data = await res.json();

      const tbody = document.getElementById("table");
      tbody.innerHTML = "";

      if (!Array.isArray(data) || data.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="5" style="text-align:center;">No submissions yet</td>
          </tr>
        `;
        return;
      }

      data.forEach((s) => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${escapeHtml(s.student?.fullName)}</td>
          <td>${escapeHtml(s.student?.indexNumber)}</td>
          <td>${escapeHtml(s.student?.date || "")}</td>
          <td>${escapeHtml(s.submittedAt)}</td>
          <td>${Number(s.elapsedSeconds || 0)}s</td>
        `;

        tbody.appendChild(row);
      });
    }

    // ---------- Logout ----------
    async function logout() {
      await fetch("/api/admin/logout", { method: "POST" });
      window.location.href = "/admin-login.html";
    }

    // ---------- Download CSV ----------
    function downloadCSV() {
      window.open("/api/submissions.csv", "_blank");
    }

    // ---------- Basic HTML escaping (security fix) ----------
    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    // ---------- Auto refresh ----------
    load();
    setInterval(load, 5000);
  </script>
</body>
</html>
