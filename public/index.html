<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pastoral School Examination — Those Who Are Proud</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <section class="login-view">
    <div class="login-bg-grid" aria-hidden="true"></div>
    <div class="login-card">
      <p class="brand-mark">Pastoral School</p>
      <h1>Sign in to start your exam</h1>
      <p class="login-copy">Enter your student ID to unlock the assessment for <strong>Those Who Are Proud</strong>.</p>
      
      <form id="loginForm" class="login-form">
        <label>
          Student ID
          <input id="loginIndexNumber" autocomplete="username" required placeholder="e.g. PS-2025-001" />
        </label>
        <button class="primary wide" type="submit">Continue to Exam</button>
      </form>

      <div class="login-meta" aria-label="Exam details">
        <span>2h 30m</span>
        <span>3 sections</span>
        <span>100 marks</span>
      </div>
      <p class="login-note">Your timer starts after this step.</p>
    </div>
  </section>

  <script src="/app.js"></script>
</body>
</html>
