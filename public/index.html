<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pastoral School Examination - Those Who Are Proud</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>

  <body>

    <!-- ================= LOGIN VIEW ================= -->
    <section id="loginView" class="login-view">
      <div class="login-card">
        <h1>Sign in to start your exam</h1>

        <form id="loginForm">
          <label>
            Student ID
            <input id="loginIndexNumber" required />
          </label>

          <button type="submit" class="primary wide">
            Continue to Exam
          </button>
        </form>
      </div>
    </section>

    <!-- ================= EXAM VIEW ================= -->
    <div id="examView" hidden>

      <header class="topbar">
        <h1>Those Who Are Proud</h1>

        <div>
          Time Left:
          <strong id="timer">02:30:00</strong>
        </div>
      </header>

      <form id="examForm">

        <label>
          Full Name
          <input name="fullName" required />
        </label>

        <label>
          Index Number
          <input name="indexNumber" readonly required />
        </label>

        <label>
          Date
          <input name="date" type="date" required />
        </label>

        <hr />

        <!-- MCQ -->
        <section>
          <h2>Section A</h2>

          <label>
            Q1
            <input type="radio" name="q1" value="A" data-mcq /> A
            <input type="radio" name="q1" value="B" data-mcq /> B
          </label>
        </section>

        <!-- BLANKS -->
        <section>
          <h2>Section B</h2>

          <input name="blank1" data-blank placeholder="Answer blank 1" />
        </section>

        <!-- ESSAY -->
        <section>
          <h2>Section C</h2>

          <textarea data-essay placeholder="Essay 1"></textarea>
          <textarea data-essay placeholder="Essay 2"></textarea>
        </section>

        <button type="submit">Submit Exam</button>

      </form>
    </div>

    <!-- ================= SCRIPT ================= -->
    <script>
      const STORAGE_KEY = "pastoral_exam_state";

      let remainingSeconds = 9000;
      let timerInterval;

      // ================= LOGIN =================
      document.getElementById("loginForm").addEventListener("submit", (e) => {
        e.preventDefault();

        const id = document.getElementById("loginIndexNumber").value.trim();
        if (!id) return alert("Enter Student ID");

        const state = loadState() || {};

        state.student = {
          indexNumber: id
        };

        state.remainingSeconds = state.remainingSeconds || 9000;

        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

        startExam();
      });

      // ================= START EXAM =================
      function startExam() {
        document.getElementById("loginView").style.display = "none";
        document.getElementById("examView").hidden = false;

        const saved = loadState();

        if (saved?.student?.indexNumber) {
          document.querySelector('[name="indexNumber"]').value =
            saved.student.indexNumber;
        }

        remainingSeconds = saved?.remainingSeconds || 9000;

        startTimer(remainingSeconds);
        restoreState();
      }

      // ================= STATE =================
      function saveState() {
        const data = {
          student: {
            fullName: document.querySelector('[name="fullName"]').value,
            indexNumber: document.querySelector('[name="indexNumber"]').value,
            date: document.querySelector('[name="date"]').value
          },
          answers: collectMCQ(),
          blanks: collectBlanks(),
          essays: collectEssays(),
          remainingSeconds
        };

        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      function loadState() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY));
        } catch {
          return null;
        }
      }

      function restoreState() {
        const data = loadState();
        if (!data) return;

        if (data.student) {
          document.querySelector('[name="fullName"]').value =
            data.student.fullName || "";

          document.querySelector('[name="date"]').value =
            data.student.date || "";
        }

        restoreMCQ(data.answers || {});
        restoreBlanks(data.blanks || {});
        restoreEssays(data.essays || []);
      }

      // ================= TIMER =================
      function startTimer(sec) {
        clearInterval(timerInterval);

        function render() {
          const h = String(Math.floor(sec / 3600)).padStart(2, "0");
          const m = String(Math.floor((sec % 3600) / 60)).padStart(2, "0");
          const s = String(sec % 60).padStart(2, "0");

          document.getElementById("timer").textContent =
            `${h}:${m}:${s}`;
        }

        render();

        timerInterval = setInterval(() => {
          sec--;
          remainingSeconds = sec;

          saveState();

          if (sec <= 0) {
            clearInterval(timerInterval);
            alert("Time up!");
            document.getElementById("examForm").submit();
            return;
          }

          render();
        }, 1000);
      }

      // ================= COLLECT =================
      function collectMCQ() {
        const data = {};
        document.querySelectorAll("[data-mcq]:checked").forEach(el => {
          data[el.name] = el.value;
        });
        return data;
      }

      function collectBlanks() {
        const data = {};
        document.querySelectorAll("[data-blank]").forEach(el => {
          data[el.name] = el.value;
        });
        return data;
      }

      function collectEssays() {
        return Array.from(document.querySelectorAll("[data-essay]"))
          .map(el => el.value);
      }

      // ================= RESTORE =================
      function restoreMCQ(data) {
        Object.entries(data).forEach(([name, value]) => {
          const el = document.querySelector(
            `[name="${name}"][value="${value}"]`
          );
          if (el) el.checked = true;
        });
      }

      function restoreBlanks(data) {
        Object.entries(data).forEach(([name, value]) => {
          const el = document.querySelector(`[name="${name}"]`);
          if (el) el.value = value;
        });
      }

      function restoreEssays(data) {
        document.querySelectorAll("[data-essay]").forEach((el, i) => {
          el.value = data[i] || "";
        });
      }

      // ================= AUTO SAVE =================
      document.addEventListener("input", saveState);
      document.addEventListener("change", saveState);

      // ================= AUTO RESUME =================
      window.addEventListener("load", () => {
        const saved = loadState();

        if (saved?.student?.indexNumber) {
          startExam();
        }
      });
    </script>

  </body>
</html>
