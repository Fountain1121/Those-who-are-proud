<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pastoral School Examination</title>
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>

<!-- LOGIN -->
<section id="loginView" class="login-view">
  <div class="login-card">
    <h1>Sign in</h1>

    <form id="loginForm">
      <label>
        Student ID
        <input id="loginIndexNumber" required />
      </label>

      <button type="submit">Continue</button>
    </form>
  </div>
</section>

<!-- EXAM -->
<div id="examView" class="app-view" hidden>

  <header class="topbar">
    <h1>Those Who Are Proud</h1>
    <div>Time Left: <span id="timer">02:30:00</span></div>
  </header>

  <main class="exam-layout">

    <form id="examForm">

      <section class="panel">
        <h2>Student Info</h2>

        <input name="fullName" placeholder="Full Name" />
        <input name="indexNumber" readonly />
        <input name="date" type="date" />
      </section>

      <section>
        <h2>Section A</h2>

        <p>Q1 Example Question</p>
        <label><input type="radio" name="q1" value="A" data-mcq> A</label>
        <label><input type="radio" name="q1" value="B" data-mcq> B</label>
      </section>

      <section>
        <h2>Section B</h2>
        <input name="blank1" data-blank placeholder="Answer" />
      </section>

      <section>
        <h2>Section C</h2>
        <textarea data-essay></textarea>
        <textarea data-essay></textarea>
      </section>

      <button type="submit">Submit Exam</button>

    </form>

  </main>
</div>

<script src="/app.js"></script>
</body>
</html>
