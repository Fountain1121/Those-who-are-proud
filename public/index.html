<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pastoral School Examination</title>
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>

<!-- ================= LOGIN ================= -->
<section id="loginView">
  <h1>Exam Login</h1>

  <form id="loginForm">
    <label>
      Student ID
      <input id="loginIndexNumber" required />
    </label>

    <button type="submit">Continue to Exam</button>
  </form>
</section>

<!-- ================= EXAM ================= -->
<section id="examView" hidden>

  <header>
    <h2>Those Who Are Proud</h2>
    <div>Time Left: <span id="timer">02:30:00</span></div>
  </header>

  <form id="examForm">

    <label>
      Full Name
      <input name="fullName" />
    </label>

    <label>
      Index Number
      <input name="indexNumber" readonly />
    </label>

    <label>
      Date
      <input name="date" type="date" />
    </label>

    <hr />

    <!-- MCQ -->
    <div>
      <p>Q1</p>
      <label><input type="radio" name="q1" value="A" data-mcq> A</label>
      <label><input type="radio" name="q1" value="B" data-mcq> B</label>
    </div>

    <!-- BLANK -->
    <div>
      <p>Fill in blank</p>
      <input name="blank1" data-blank />
    </div>

    <!-- ESSAY -->
    <div>
      <textarea data-essay placeholder="Essay 1"></textarea>
      <textarea data-essay placeholder="Essay 2"></textarea>
    </div>

    <button type="submit">Submit Exam</button>

  </form>
</section>

<!-- ================= SCRIPT ================= -->
<script>
const STORAGE_KEY = "exam_state_clean";

let remainingSeconds = 9000;
let timerInterval;

/* ================= LOGIN ================= */
document.getElementById("loginForm").addEventListener("submit", (e) => {
  e.preventDefault();

  const id = document.getElementById("loginIndexNumber").value.trim();
  if (!id) return alert("Enter Student ID");

  const state = loadState() || {};

  state.student = { indexNumber: id };
  state.remainingSeconds = remainingSeconds;

  saveToStorage(state);

  startExam(id);
});

/* ================= START EXAM ================= */
function startExam(idFromLogin = null) {

  const loginView = document.getElementById("loginView");
  const examView = document.getElementById("examView");

  loginView.style.display = "none";
  examView.hidden = false;

  const state = loadState();

  const id = idFromLogin || state?.student?.indexNumber;

  if (id) {
    document.querySelector('[name="indexNumber"]').value = id;
  }

  remainingSeconds = state?.remainingSeconds || 9000;

  restoreState();

  startTimer();
}

/* ================= TIMER ================= */
function startTimer() {
  clearInterval(timerInterval);

  function render() {
    const h = String(Math.floor(remainingSeconds / 3600)).padStart(2, "0");
    const m = String(Math.floor((remainingSeconds % 3600) / 60)).padStart(2, "0");
    const s = String(remainingSeconds % 60).padStart(2, "0");

    document.getElementById("timer").textContent = `${h}:${m}:${s}`;
  }

  render();

  timerInterval = setInterval(() => {
    remainingSeconds--;

    saveProgress();

    if (remainingSeconds <= 0) {
      clearInterval(timerInterval);
      alert("Time up!");
      document.getElementById("examForm").submit();
      return;
    }

    render();
  }, 1000);
}

/* ================= SAVE ================= */
function saveProgress() {
  const state = loadState() || {};

  state.student = {
    fullName: document.querySelector('[name="fullName"]').value,
    indexNumber: document.querySelector('[name="indexNumber"]').value,
    date: document.querySelector('[name="date"]').value
  };

  state.answers = collectMCQ();
  state.blanks = collectBlanks();
  state.essays = collectEssays();
  state.remainingSeconds = remainingSeconds;

  saveToStorage(state);
}

function saveToStorage(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY));
  } catch {
    return null;
  }
}

/* ================= RESTORE ================= */
function restoreState() {
  const state = loadState();
  if (!state) return;

  if (state.student) {
    document.querySelector('[name="fullName"]').value = state.student.fullName || "";
    document.querySelector('[name="date"]').value = state.student.date || "";
  }

  restoreMCQ(state.answers || {});
  restoreBlanks(state.blanks || {});
  restoreEssays(state.essays || []);
}

/* ================= COLLECT ================= */
function collectMCQ() {
  const data = {};
  document.querySelectorAll("[data-mcq]:checked").forEach(el => {
    data[el.name] = el.value;
  });
  return data;
}

function collectBlanks() {
  const data = {};
  document.querySelectorAll("[data-blank]").forEach(el => {
    data[el.name] = el.value;
  });
  return data;
}

function collectEssays() {
  return Array.from(document.querySelectorAll("[data-essay]"))
    .map(el => el.value);
}

/* ================= RESTORE HELPERS ================= */
function restoreMCQ(data) {
  Object.entries(data).forEach(([name, value]) => {
    const el = document.querySelector(`[name="${name}"][value="${value}"]`);
    if (el) el.checked = true;
  });
}

function restoreBlanks(data) {
  Object.entries(data).forEach(([name, value]) => {
    const el = document.querySelector(`[name="${name}"]`);
    if (el) el.value = value;
  });
}

function restoreEssays(data) {
  document.querySelectorAll("[data-essay]").forEach((el, i) => {
    el.value = data[i] || "";
  });
}

/* ================= AUTO SAVE EVENTS ================= */
document.addEventListener("input", saveProgress);
document.addEventListener("change", saveProgress);

/* ================= INIT ================= */
window.addEventListener("load", () => {
  const state = loadState();

  if (state?.student?.indexNumber) {
    startExam();
  }
});
</script>

</body>
</html>
